name: CI-CD Orchestrator

on:
 push:
   branches: [ main ]

jobs:
  sast:
    uses: KrakennTunisie/Devops_workflow/.github/workflows/SAST.yml@main
    secrets: inherit

  build:
    needs: sast
    uses:  KrakennTunisie/Devops_workflow/.github/workflows/build.yml@main

  deloyment:
    needs: build
    uses:  KrakennTunisie/Devops_workflow/.github/workflows/deployment.yml@main
    with:
      service-name: ${{ github.event.repository.name }}
      service-port: "8081"
