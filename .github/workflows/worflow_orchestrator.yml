name: CI-CD Orchestrator

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: "17"
    secrets:
      SERVER_HOST:
        required: true
      SERVER_USER:
        required: true
      SERVER_PASSWORD:
        required: true
      PRO_SERVER_IP:
        required: true
      PROD_SERVER_PASSWORD:
        required: true

jobs:
  tests:
    uses: KrakennTunisie/Devops_workflow/.github/workflows/test.yml@main
    secrets: inherit
    with:
      java-version: "17"
      maven-args: "-B -ntp verify"
      working-directory: "."

  build:
    needs: tests
    uses: KrakennTunisie/Devops_workflow/.github/workflows/build.yml@main

  deployment:
    needs: build
    uses: KrakennTunisie/Devops_workflow/.github/workflows/deployment.yml@main
    secrets:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
    with:
      service-name: ${{ github.event.repository.name }}

  smoke-test:                                        # ← 2 espaces
    needs: deployment
    uses: KrakennTunisie/Devops_workflow/.github/workflows/smoke-test.yml@main
    secrets:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
    with:
      service-name: ${{ github.event.repository.name }}

  deployment-prod:                                   # ← 2 espaces
    needs: smoke-test
    uses: KrakennTunisie/Devops_workflow/.github/workflows/deployment-prod.yml@main
    secrets:
      PRO_SERVER_IP: ${{ secrets.PRO_SERVER_IP }}
      PROD_SERVER_PASSWORD: ${{ secrets.PROD_SERVER_PASSWORD }}
    with:
      service-name: ${{ github.event.repository.name }}
