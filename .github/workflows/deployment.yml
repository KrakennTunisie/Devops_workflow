name: Deployment

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-port:
       required: true
       type: string
    secrets:
      SERVER_HOST:
        required: true
      SERVER_USER:
        required: true
      SERVER_PASSWORD:
        required: true
      DOCKERHUB_USERNAME:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service-name }}:latest
            docker stop ${{ inputs.service-name }} || true
            docker rm ${{ inputs.service-name }} || true
            docker run -d --name ${{ inputs.service-name }} \
              -p 8080:8080 \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service-name }}:latest
