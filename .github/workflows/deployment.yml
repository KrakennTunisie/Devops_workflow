name: deployment

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-port:
       required: true
       type: string
    secrets:
      SERVER_HOST:
        required: true
      SERVER_USER:
        required: true
      SERVER_PASSWORD:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /opt/stack

            # (optionnel mais recommandé si registry privé ou token)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdinn

            docker compose pull ${{ inputs.service-name }}
            docker compose up -d ${{ inputs.service-name }}

            docker image prune -f
